# A-Mem 官方 LoCoMo robust 入口的 method profile。
# smoke 只缩小 benchmark 数据规模；method 参数保持官方默认 retrieve_k=10。

[smoke]
llm_model = "gpt-4o-mini"
embedding_model = "all-MiniLM-L6-v2"
retrieve_k = 10
max_workers = 1
use_robust_layer = true
suppress_official_stdout = true

[official_full]
llm_model = "gpt-4o-mini"
embedding_model = "all-MiniLM-L6-v2"
retrieve_k = 10
max_workers = 10
use_robust_layer = true
suppress_official_stdout = true
