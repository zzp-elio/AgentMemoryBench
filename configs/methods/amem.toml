# A-Mem 官方通用产品 AgenticMemorySystem profile。
# smoke 只缩小 benchmark 数据规模；method 检索深度保持产品建议 k=10。

[smoke]
llm_model = "gpt-4o-mini"
embedding_model = "all-MiniLM-L6-v2"
retrieve_k = 10
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 1
use_product_layer = true
suppress_official_stdout = true

[official_full]
llm_model = "gpt-4o-mini"
embedding_model = "all-MiniLM-L6-v2"
retrieve_k = 10
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 10
use_product_layer = true
suppress_official_stdout = true
