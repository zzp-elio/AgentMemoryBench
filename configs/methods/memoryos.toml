# MemoryOS 通用产品（memoryos-pypi）引擎的固定方法参数。
# smoke 与 official_full 仅由 benchmark 数据范围区分；方法本身参数保持一致。
# 参数取 memoryos-pypi 官方默认（memoryos.py:30-44），与旧 eval/ LoCoMo 调参不同。
# 迁移背景见 docs/workstreams/ws02.5-method-interface-audit/plan-memoryos-migration.md。

[smoke]
llm_model = "gpt-4o-mini"
embedding_model_name = "sentence-transformers/all-MiniLM-L6-v2"
short_term_capacity = 10
mid_term_capacity = 2000
long_term_knowledge_capacity = 100
retrieval_queue_capacity = 7
mid_term_heat_threshold = 5.0
mid_term_similarity_threshold = 0.6
segment_similarity_threshold = 0.1
page_similarity_threshold = 0.1
knowledge_threshold = 0.01
top_k_sessions = 5
top_k_knowledge = 20
api_timeout_seconds = 120
api_max_retries = 8
api_retry_wait_seconds = 5
api_retry_backoff_multiplier = 2
api_retry_max_wait_seconds = 60
suppress_official_stdout = true
max_workers = 1
longmemeval_prompt_profile = "memoryos-pypi-retrieve-v1"

[official_full]
llm_model = "gpt-4o-mini"
embedding_model_name = "sentence-transformers/all-MiniLM-L6-v2"
short_term_capacity = 10
mid_term_capacity = 2000
long_term_knowledge_capacity = 100
retrieval_queue_capacity = 7
mid_term_heat_threshold = 5.0
mid_term_similarity_threshold = 0.6
segment_similarity_threshold = 0.1
page_similarity_threshold = 0.1
knowledge_threshold = 0.01
top_k_sessions = 5
top_k_knowledge = 20
api_timeout_seconds = 120
api_max_retries = 8
api_retry_wait_seconds = 5
api_retry_backoff_multiplier = 2
api_retry_max_wait_seconds = 60
suppress_official_stdout = true
max_workers = 10
longmemeval_prompt_profile = "memoryos-pypi-retrieve-v1"
