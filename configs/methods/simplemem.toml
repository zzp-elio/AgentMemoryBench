# SimpleMem text backend product profile.
# smoke 只缩小 benchmark 数据规模；build 显式锁为逐窗口串行：
# framework 走 add_dialogue()，以保留 overlap 与 previous_entries 的顺序依赖；
# 官方 add_dialogues_parallel() 会让同批窗口共享提交前的旧 context，不用于本项目。
# ws02.5 config 归一化（方案 B，2026-07-09）：统一 embedder 到 all-MiniLM-L6-v2
# （dim 1024→384）。provider 已是 sentence-transformers-local（adapter:153 本地，
# 无需改）。算法参数（window_size/overlap_size/semantic_top_k/keyword_top_k/
# structured_top_k 等）保持 repo 默认不动。旧 embedder Qwen3-Embedding-0.6B/1024
# 差异留档 method-interface-inventory.md hyperparameters 字段。

[smoke]
llm_model = "gpt-4o-mini"
embedding_model_path = "models/all-MiniLM-L6-v2"
embedding_dimension = 384
window_size = 40
overlap_size = 2
semantic_top_k = 25
keyword_top_k = 5
structured_top_k = 5
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 1
enable_planning = true
enable_reflection = true
max_reflection_rounds = 2
enable_parallel_processing = false
enable_parallel_retrieval = true

[official_full]
llm_model = "gpt-4o-mini"
embedding_model_path = "models/all-MiniLM-L6-v2"
embedding_dimension = 384
window_size = 40
overlap_size = 2
semantic_top_k = 25
keyword_top_k = 5
structured_top_k = 5
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 10
enable_planning = true
enable_reflection = true
max_reflection_rounds = 2
enable_parallel_processing = false
enable_parallel_retrieval = true
