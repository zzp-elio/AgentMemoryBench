# LightMem 官方 conversation-QA profile。
# smoke 只缩小 benchmark 数据规模；method 参数保持 LoCoMo reported total-limit=60。
# ws02.5 config 归一化（方案 B，2026-07-09）：extract_threshold/offline_update
# score_threshold 从 adapter 硬编码移进 TOML，用 repo 默认——extract_threshold=0.5
# （configs/base.py:58 default=0.5，旧 adapter 硬编码 0.1 为 paper 对齐已弃用）、
# offline_update_score_threshold=0.8（README/tutorial 用 0.8，旧 adapter 硬编码 0.9
# 为 paper 对齐已弃用）。embedder 已是 all-MiniLM 不动。差异留档
# method-interface-inventory.md hyperparameters 字段。
# lifecycle_profile（2026-07-15 online-soft 改判）：Phase 1 五格主 profile 显式声明
# online_soft（论文 §3.3 soft updating at test time，只 direct insert、不做全库
# offline consolidation）。不依赖 dataclass 默认，两个 section 都显式写。LoCoMo
# 补充轨 locomo_offline_consolidated 不在此文件声明，需要时另建显式 profile。
# missing_timestamp_policy（2026-07-15 缺失时间兼容 Phase B）：online-soft 主 profile
# 显式声明 preserve_none，把 MemBench 官方 NoiseData 等无时间 message 的缺失 timestamp
# 原样保持 None 透传给 direct insert，绝不伪造时间。不依赖 dataclass 默认（默认为严格
# 的 require），两个 section 都显式写。consolidated 补充轨仍须用 require。裁决见
# branches/membench-time-semantics/notes/lightmem-missing-time-compatibility-ruling.md。

[smoke]
llm_model = "gpt-4o-mini"
embedding_model_path = "models/all-MiniLM-L6-v2"
llmlingua_model_path = "models/llmlingua-2-bert-base-multilingual-cased-meetingbank"
retrieve_limit = 60
extract_threshold = 0.5
offline_update_score_threshold = 0.8
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 1
pre_compress = true
compression_rate = 0.7
stm_threshold = 512
topic_segment = true
text_summary = true
suppress_official_stdout = true
lifecycle_profile = "online_soft"
missing_timestamp_policy = "preserve_none"

[official_full]
llm_model = "gpt-4o-mini"
embedding_model_path = "models/all-MiniLM-L6-v2"
llmlingua_model_path = "models/llmlingua-2-bert-base-multilingual-cased-meetingbank"
retrieve_limit = 60
extract_threshold = 0.5
offline_update_score_threshold = 0.8
api_timeout_seconds = 60.0
api_max_retries = 8
max_workers = 10
pre_compress = true
compression_rate = 0.7
stm_threshold = 512
topic_segment = true
text_summary = true
suppress_official_stdout = true
lifecycle_profile = "online_soft"
missing_timestamp_policy = "preserve_none"
