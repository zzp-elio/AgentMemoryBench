[project]
name = "lightmem-egolife"
version = "0.1.0"
description = "EgoLife experiment environment for EM2Mem inside LightMem"
requires-python = ">=3.10,<3.14"
dependencies = [
    "torch==2.8.0",
    "transformers>=4.57.0",
    "sentence-transformers>=5.1.1",
    "accelerate>=1.10.0",
    "openai>=2.3.0",
    "tenacity>=8.2.0",
    "numpy>=1.26.4",
    "pillow>=10.0.0",
    "tqdm>=4.67.0",
    "pydantic>=2.0.0",
    "pydantic-core>=2.0.0",
    "scikit-learn>=1.4.0",
    "opencv-python>=4.8.0",
    "decord>=0.6.0",
    "pandas>=2.0.0",
    "pysrt>=1.1.2",
    "python-dotenv>=1.0.0",
    "igraph>=0.11.0",
    "huggingface-hub>=0.35.0",
    "filelock>=3.13.0",
]

[project.optional-dependencies]
visual = [
    "qwen-vl-utils[decord]>=0.0.8",
    "torchvision>=0.22.0",
    "torchcodec>=0.3",
    "peft>=0.13.0",
    "scikit-image>=0.22.0",
    "einops>=0.8.0",
    "timm>=1.0.0",
    "sentencepiece>=0.2.0",
    "hnswlib>=0.8.0",
]
flash-attn = [
    "flash-attn==2.8.0.post2",
]

[tool.uv]
package = false
no-build-isolation-package = ["flash-attn"]

[tool.uv.extra-build-dependencies]
flash-attn = ["torch"]
